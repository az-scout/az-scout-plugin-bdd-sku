# Azure Container Apps Job — SKU Mapper
#
# Deploy with:
#   az containerapp job create \
#     --name sku-mapper-job \
#     --resource-group <rg> \
#     --environment <env> \
#     --yaml deploy/container-app-job.yaml

properties:
  configuration:
    replicaRetryLimit: 2
    replicaTimeout: 600
    triggerType: Schedule
    scheduleTriggerConfig:
      cronExpression: "0 4 * * *"
      parallelism: 1
      replicaCompletionCount: 1
  template:
    containers:
      - name: sku-mapper-job
        image: ghcr.io/your-org/sku-mapper-job:latest
        resources:
          cpu: 0.25
          memory: 0.5Gi
        env:
          - name: PGHOST
            secretRef: pg-host
          - name: PGPORT
            secretRef: pg-port
          - name: PGDATABASE
            secretRef: pg-database
          - name: PGUSER
            secretRef: pg-user
          - name: PGPASSWORD
            secretRef: pg-password
          - name: PGSSLMODE
            value: require
          - name: LOG_LEVEL
            value: info
