apiVersion: batch/v1
kind: CronJob
metadata:
  name: sku-mapper-job
  labels:
    app: sku-mapper-job
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sku-mapper-job
              image: ghcr.io/your-org/sku-mapper-job:latest
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "256Mi"
              env:
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: pg-credentials
                      key: host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: pg-credentials
                      key: port
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      name: pg-credentials
                      key: database
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: pg-credentials
                      key: user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-credentials
                      key: password
                - name: PGSSLMODE
                  value: "require"
                - name: LOG_LEVEL
                  value: "info"
